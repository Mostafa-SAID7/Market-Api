<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a0826d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6f47;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Circle -->
  <circle cx="60" cy="60" r="55" fill="#2a1f17" stroke="url(#logoGradient)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Inner Circle -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.5"/>
  
  <!-- Shopping Cart -->
  <g transform="translate(60, 60)">
    <!-- Cart Body -->
    <path d="M -20 -15 L -15 -15 L -8 15 L 18 15 L 24 -5 L -12 -5" 
          fill="none" 
          stroke="url(#logoGradient)" 
          stroke-width="3.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#glow)"/>
    
    <!-- Cart Wheels -->
    <circle cx="-5" cy="23" r="4" fill="url(#logoGradient)" filter="url(#glow)"/>
    <circle cx="15" cy="23" r="4" fill="url(#logoGradient)" filter="url(#glow)"/>
    
    <!-- API Brackets -->
    <path d="M -32 -5 L -38 0 L -32 5" 
          fill="none" 
          stroke="#d4af37" 
          stroke-width="3" 
          stroke-linecap="round"
          opacity="0.8"/>
    <path d="M 32 -5 L 38 0 L 32 5" 
          fill="none" 
          stroke="#d4af37" 
          stroke-width="3" 
          stroke-linecap="round"
          opacity="0.8"/>
    
    <!-- Decorative Dots -->
    <circle cx="0" cy="-35" r="2" fill="#d4af37" opacity="0.6"/>
    <circle cx="-25" cy="-25" r="1.5" fill="#a0826d" opacity="0.5"/>
    <circle cx="25" cy="-25" r="1.5" fill="#a0826d" opacity="0.5"/>
  </g>
  
  <!-- Subtle Ring Effect -->
  <circle cx="60" cy="60" r="42" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>
</svg>
