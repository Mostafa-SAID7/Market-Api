<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a0826d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6f47;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Circle -->
  <circle cx="60" cy="60" r="55" fill="#2a1f17" stroke="url(#logoGradient)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Inner Circle -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.5"/>
  
  <!-- Shopping Cart -->
  <g transform="translate(60, 60)">
    <!-- Cart Body -->
    <path d="M -22 -18 L -16 -18 L -6 18 L 22 18 L 28 -8 L -10 -8" 
          fill="none" 
          stroke="url(#logoGradient)" 
          stroke-width="4" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#glow)"/>
    
    <!-- Cart Wheels -->
    <circle cx="-2" cy="28" r="5" fill="url(#logoGradient)" filter="url(#glow)"/>
    <circle cx="20" cy="28" r="5" fill="url(#logoGradient)" filter="url(#glow)"/>
    
    <!-- Decorative Dots -->
    <circle cx="0" cy="-38" r="2.5" fill="#d4af37" opacity="0.7"/>
    <circle cx="-28" cy="-28" r="2" fill="#a0826d" opacity="0.6"/>
    <circle cx="28" cy="-28" r="2" fill="#a0826d" opacity="0.6"/>
    <circle cx="-35" cy="0" r="1.5" fill="#8b6f47" opacity="0.5"/>
    <circle cx="35" cy="0" r="1.5" fill="#8b6f47" opacity="0.5"/>
  </g>
  
  <!-- Subtle Ring Effect -->
  <circle cx="60" cy="60" r="42" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>
</svg>
