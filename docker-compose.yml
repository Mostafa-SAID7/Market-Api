version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - aspnet-mongodb-network

  aspnet-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aspnet-mongodb-api
    restart: always
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - MongoDbSettings__ConnectionString=mongodb://admin:password123@mongodb:27017
      - MongoDbSettings__DatabaseName=MongoDbDemo
    depends_on:
      - mongodb
    networks:
      - aspnet-mongodb-network

volumes:
  mongodb_data:

networks:
  aspnet-mongodb-network:
    driver: bridge
